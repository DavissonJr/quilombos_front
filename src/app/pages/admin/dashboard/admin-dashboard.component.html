<div class="dashboard-page">
  <div class="dashboard-header">
    <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
      <div>
        <h1 class="dash-title">Painel Administrativo</h1>
        <p class="dash-subtitle">{{ total }} postagem(s) no total</p>
      </div>
      <div class="d-flex gap-2">
        <a routerLink="/admin/postagem/nova" class="btn-novo">+ Nova Postagem</a>
        <button class="btn-sair" (click)="logout()">Sair</button>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="loading-wrap" *ngIf="carregando">
      <div class="spinner"></div>
    </div>

    <div class="postagens-lista" *ngIf="!carregando">
      <div class="post-row" *ngFor="let p of postagens">
        <div class="post-thumb" *ngIf="p.imagemHeaderUrl">
          <img [src]="p.imagemHeaderUrl" [alt]="p.titulo" />
        </div>
        <div class="post-thumb placeholder" *ngIf="!p.imagemHeaderUrl">📰</div>
        <div class="post-info">
          <span class="post-quilombo">{{ p.quilomboNome }}</span>
          <h3 class="post-titulo">{{ p.titulo }}</h3>
          <span class="post-data">{{ formatarData(p.dataHora) }}</span>
          <p class="post-sub" *ngIf="p.subtitulo">{{ p.subtitulo }}</p>
        </div>
        <div class="post-actions">
          <a [routerLink]="['/noticias', p.id]" class="btn-ver" target="_blank">Ver</a>
          <button class="btn-del" (click)="deletarPostagem(p.id, p.titulo)">Excluir</button>
        </div>
      </div>

      <div class="sem-posts" *ngIf="postagens.length === 0">
        <p>Nenhuma postagem ainda.</p>
        <a routerLink="/admin/postagem/nova" class="btn-novo">Criar primeira postagem →</a>
      </div>
    </div>
  </div>
</div>
